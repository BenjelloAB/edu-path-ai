name: Build and Deploy
 
on:
  push:
    branches:
      - main  # Only trigger on merges to main, not every branch push
 
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
 
      # ── STEP 1: Build and push images to DockerHub ──────────────────────────
 
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
 
      - name: Build and push backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/agile-backend:${{ env.IMAGE_TAG }} ./agile-backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/agile-backend:${{ env.IMAGE_TAG }}
 
      - name: Build and push frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/agile-frontend:${{ env.IMAGE_TAG }} ./agile-frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/agile-frontend:${{ env.IMAGE_TAG }}
 
      # ── STEP 2: Deploy to K3s cluster ───────────────────────────────────────
 
      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          # KUBECONFIG secret = contents of k3s-kubeconfig.yaml from Ansible
          # You must replace the server IP: sed -i 's/127.0.0.1/MASTER_PUBLIC_IP/' ~/.kube/config
          sed -i 's/127.0.0.1/${{ secrets.MASTER_PUBLIC_IP }}/' ~/.kube/config
 
      - name: Create backend secret from GitHub Secrets
        run: |
          kubectl create secret generic backend-secrets \
            --from-literal=JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
            --from-literal=DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --dry-run=client -o yaml | kubectl apply -f -
 
      - name: Update image tags in manifests and apply
        run: |
          # Replace YOUR_DOCKERHUB_USERNAME/agile-backend:latest with actual tag
          sed -i 's|YOUR_DOCKERHUB_USERNAME/agile-backend:latest|${{ secrets.DOCKERHUB_USERNAME }}/agile-backend:${{ env.IMAGE_TAG }}|g' kubernetes/backend-deployment.yaml
          sed -i 's|YOUR_DOCKERHUB_USERNAME/agile-frontend:latest|${{ secrets.DOCKERHUB_USERNAME }}/agile-frontend:${{ env.IMAGE_TAG }}|g' kubernetes/frontend-deployment.yaml
 
          kubectl apply -f kubernetes/persistent-volume.yaml
          kubectl apply -f kubernetes/backend-deployment.yaml
          kubectl apply -f kubernetes/frontend-deployment.yaml
          kubectl apply -f kubernetes/services.yaml
          kubectl apply -f kubernetes/ingress.yaml
 
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend
          kubectl rollout status deployment/frontend