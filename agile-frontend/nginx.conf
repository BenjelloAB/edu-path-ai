worker_processes  1;

events {
    worker_connections  1024;
}

http {
    # Point to the actual Nginx install directory
    include "C:\\Users\\pc\\Downloads\\nginx-1.23.4\\nginx-1.23.4\\conf\\mime.types";
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name localhost;

        # Serve the Static Files (React)
        location / {
            root "F:\\agile_project\\agile-frontend\\dist"; 
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Reverse Proxy for the Backend (Flask + Waitress)
        location /api/ {
            proxy_pass http://127.0.0.1:5000; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}