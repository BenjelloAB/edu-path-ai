worker_processes auto; # Automatically scales to CPU cores

events {
    worker_connections 1024;
}

http {
    # Standard Linux path for mime.types in the official Nginx image
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Enable Gzip to save bandwidth (Better for your 4GB RAM limits)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 80;
        server_name localhost;

        # Serve the Static Files (React)
        location / {
            # In Docker, we will copy our 'dist' files to this folder
            root /usr/share/nginx/html; 
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Reverse Proxy for the Backend
        location /api/ {
            # 'backend' is the name of the service in docker-compose.yml
            proxy_pass http://backend:5000; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}