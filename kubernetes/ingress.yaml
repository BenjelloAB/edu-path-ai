apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agile-ingress
  annotations:
    # This tells K8s which Ingress Controller to use
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - http:
        paths:
          # All /api/* requests go to the Flask backend
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
 
          # All other requests go to the React frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80